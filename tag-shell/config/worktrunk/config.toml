worktree-path = "~/worktrees/{{ repo }}/{{ branch | sanitize }}"

[commit.generation]
command = "CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

# `wt diff` — open this branch's changes (vs the merge base with origin's
# default branch) in a cmux diff browser split. On-demand only; requires cmux.
[aliases]
diff = "cmux diff --branch --layout unified --focus true"

# Create the cmux workspace (claude + shell split) for a brand-new worktree,
# blocking at creation time so the layout is up before the switch returns.
[[pre-start]]
cmux = "cmux-workspace create '{{ repo | sanitize }}/{{ branch | sanitize }}' '{{ worktree_path }}' '{{ branch | codename(2) }}'"

# On any switch (including into an existing worktree), select the matching cmux
# workspace, or create it if the worktree exists but its workspace is gone.
# post-switch runs after branch resolution, so shortcuts like `-`, `@`, `pr:N`
# resolve to the real branch name before we compute the workspace title.
[[post-switch]]
cmux = "cmux-workspace create '{{ repo | sanitize }}/{{ branch | sanitize }}' '{{ worktree_path }}' '{{ branch | codename(2) }}'"

# On worktree removal, close the matching cmux workspace and kill its zmx
# claude session.
[pre-remove]
cmux = "cmux-workspace remove '{{ repo | sanitize }}/{{ branch | sanitize }}' '{{ branch | codename(2) }}'"

# Trust the new worktree's .envrc so direnv loads it. No-op if there's no
# .envrc in the worktree.
[[pre-start]]
direnv = 'test -f "{{ worktree_path }}/.envrc" && direnv allow "{{ worktree_path }}" || true'

# Canary-specific: on-demand alias (invoke with `wt gateway`)
[projects."github.com/canary-technologies-corp/canary".aliases]
gateway = "cd {{ worktree_path }}/backend/pms-gateway && make setup"
