worktree-path = "$HOME/.worktrees/{{ branch | sanitize }}"

# Broadcast the destination worktree path to every terminal surface in the
# current cmux workspace, so all panes follow on every `wt switch`. Runs in
# the background; cmux-cd-all is a no-op (|| true) when cmux isn't running.
post-switch = "cmux-cd-all '{{ worktree_path }}' || true"

[commit.generation]
command = "CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

# Spawn a detached tmux session per worktree, named after the branch.
# Idempotent — `has-session` short-circuits when the session already exists.
# No-op outside tmux ($TMUX unset). Attach via the `wsc` shell alias.
[[pre-start]]
tmux = """
[ -n "$TMUX" ] || exit 0
S={{ branch | sanitize }}
W={{ worktree_path }}
if tmux has-session -t "$S" 2>/dev/null; then
  echo "✓ tmux session '$S' already exists"
  exit 0
fi
tmux new-session -d -s "$S" -c "$W" -n dev
tmux split-window -h -t "$S:dev" -c "$W"
tmux select-pane -t "$S:dev.0"
echo "✓ tmux session '$S' — attach with: tmux attach -t $S"
"""

# Trust the new worktree's .envrc so direnv loads it. No-op if there's no
# .envrc in the worktree.
[[pre-start]]
direnv = 'test -f "{{ worktree_path }}/.envrc" && direnv allow "{{ worktree_path }}" || true'

# Clean up the tmux session when its worktree is removed. No-op outside tmux.
[pre-remove]
tmux = '[ -z "$TMUX" ] || tmux kill-session -t {{ branch | sanitize }} 2>/dev/null || true'

[projects."github.com/canary-technologies-corp/canary"]
aliases.setup-canary = "make -C '{{ worktree_path }}' worktree-setup-current ROOT_WORKTREE_PATH='{{ repo_path }}'"
