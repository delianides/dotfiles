worktree-path = ".worktrees/{{ branch | sanitize }}"

[commit.generation]
command = "CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

[pre-remove]
# Close the worktree's workspace/session in whichever multiplexer is active.
# wt-mux focuses the pinned workspace at cmux index 0 (MAIN by convention)
# before closing so cmux doesn't auto-select a random workspace.
#
# Tries both name shapes:
#   1. Sanitized branch (default for `wsc <branch>`).
#   2. Ticket id extracted from the branch (e.g. drew/pms-8176-foo -> PMS-8176)
#      to cover the `wsc <TICKET-ID>` flow.
mux = """
wt-mux close --name '{{ branch | sanitize }}' || true
T=$(printf '%s' '{{ branch }}' | grep -oE '[a-z]+-[0-9]+' | head -1 | tr 'a-z' 'A-Z')
[ -n "$T" ] && wt-mux close --name "$T" || true
"""

[projects."github.com/canary-technologies-corp/canary"]
aliases.setup-canary = "make -C '{{ worktree_path }}' worktree-setup-current ROOT_WORKTREE_PATH='{{ repo_path }}'"
