#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚ēó
#    ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ
#
# Terminal multiplexer
# https://github.com/tmux/tmux
#
# Set Prefix
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix

bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

bind-key "O" run-shell -b "sesh connect \"$(
   sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '‚ö°  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(‚ö°  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(ūü™ü  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(‚öôÔłŹ  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(ūüďĀ  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(ūüĒé  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(‚ö°  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Required for Neovim autoread/FocusGained to work inside tmux
set-option -g focus-events on

# TODO: find a way to toggle this?
set-option -g display-time 3000

# colors
set -g default-terminal "tmux-256color"
set-option -a terminal-features 'xterm-256color:RGB'
set -ga terminal-overrides ",*256col*:Tc"

set -g base-index 1          # start indexing windows at 1 instead of 0
set -g detach-on-destroy off # don't exit from tmux when closing a session
set -g escape-time 0         # zero-out escape time delay
set -g history-limit 1000000 # increase history size (from 2,000)
set -g mouse on              # enable mouse support
set -g renumber-windows on   # renumber all windows when any window is closed
set -g set-clipboard on      # use system clipboard
set -g status-interval 3     # update the status bar every 3 seconds

set -g status-position top
set -g status-left-length 100
set -g status-right-length 100

set -g allow-passthrough on
set -g message-command-style bg=default,fg=yellow
set -g message-style bg=default,fg=yellow
set -g mode-style bg=default,fg=yellow
set -g pane-active-border-style 'fg=black,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

bind '%' split-window -c '#{pane_current_path}' -h
bind '"' split-window -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

bind -N "‚Ćė+l last-session (via sesh) " L run-shell "sesh last || tmux display-message -d 1000 'Only one session'"
bind -N "‚Ćė+9 switch to root session (via sesh) " 9 run-shell "sesh connect --root $(pwd)"

# smart window switcher
bind -N "‚Ćė+a ai" A new-window -S -n 'ūü§Ė' 'ai'
bind -N "‚Ćė+b builder" b new-window -S -n 'ūüĒ®' 'build'
bind -N "‚Ćė+d dev" D new-window -S -n 'ūüĒß' 'dev'
bind -N "‚Ćė+e editor" E new-window -S -n 'ūüďĚ' 'nvim +GoToFile'
bind -N "‚Ćė+g lazygit" g new-window -S -n 'ūüĆ≥' 'lazygit'

bind -N "‚Ćė+G git commit (raycast) " G new-window -c "#{pane_current_path}" -n "ūüĒí" "raycast-git-commit.sh"
# bind -N "‚Ćė+G gh-dash " G new-window -c "#{pane_current_path}" -n "ūüėļ" "ghd 2> /dev/null"

bind -N "‚Ćė+R run a script" Y split-window -v -l 10 "npm run (jq -r '.scripts | keys[]' package.json | fzf --no-border)"
bind -N "‚Ćė+Q kill current session" Q kill-session
bind -N "‚Ćė+‚áß+t break pane" B break-pane
bind -N "‚Ćė+^+t join pane" J join-pane -t 1
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# horizontal and vertical splits
unbind |
bind | split-window -h
unbind _
bind _ split-window

# resize pane
bind-key -r Left resize-pane -L 5
bind-key -r Up resize-pane -U 5
bind-key -r Down resize-pane -D 5
bind-key -r Right resize-pane -R 5

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt (cmd+w)
bind-key e send-keys "tmux capture-pane -p -S - | nvim -c 'set buftype=nofile' +" Enter

# NOTE: can be used for debugging
# )\" 2> /tmp/sesh-$(date +"%Y-%m-%d-%H-%M-%S").txt"

bind-key "Z" display-popup -E "sesh connect \$(sesh list | zf --height 24)"


set -g @fzf-url-fzf-options '-p 60%,30% --prompt="Ôāé   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
set -g @tmux-last-color on
set -g @tmux-last-pager 'less -r'
set -g @tmux-last-prompt-pattern 'ÔĀĒ '
set -g @tmux-nerd-font-window-name-shell-icon 'ÔĀĒ'
set -g @tmux-nerd-font-window-name-show-name false
set -g @thumbs-command 'echo -n {} | pbcopy' # copy to clipboard
set -g @thumbs-key C
set -g @floax-bind H

# Catppuccin theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "none"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# Install TPM if it isn't currently installed
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Status line (must be after catppuccin loads via TPM)
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
